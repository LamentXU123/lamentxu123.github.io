# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: LamentXU
subtitle: 'Dreamer kiss sweater.'
description: 'LamentXU 的开发笔记'
keywords: CTF, Web Security, PHP, Python, Writeup
author: LamentXU
language: zh-CN
timezone: Asia/Shanghai

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://lamentxu.top
permalink: posts/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: Notes
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: cactus

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repository: git@github.com:lamentxu123/lamentxu123.github.io.git
  branch: master

search:
  path: search.xml
  field: post
  content: true
  format: html

marked:
  disableNunjucks: true

theme_config:
  projects_url: https://github.com/LamentXU123
  direction: ltr
  nav:
    home: /
    about: /about/
    articles: /archives/
    search: /search/
  social_links:
    -
      icon: github
      label: GitHub
      link: https://github.com/LamentXU123
    -
      icon: mail
      label: Email
      link: mailto:weilindu@php.net
    -
      icon: rss
      label: RSS
      link: /atom.xml
  posts_overview:
    show_all_posts: false
    post_count: 10
    sort_updated: false
  archive:
    sort_updated: false
  post:
    show_updated: true
  copyright:
    start_year: 2024
  logo:
    enabled: true
    width: 50
    height: 50
    url: /images/cnblogs-avatar.png
    gravatar: false
    grayout: false
  favicon:
    desktop:
      url: /images/cnblogs-avatar.ico
      gravatar: false
    android:
      url: /images/cnblogs-avatar.png
      gravatar: false
    apple:
      url: /images/cnblogs-avatar.png
      gravatar: false
  colorscheme: dark
  page_width: 58
  rss: /atom.xml
  mathjax:
    enabled: false
  disqus:
    enabled: false
  utterances:
    enabled: false
  google_analytics:
    enabled: false
  baidu_analytics:
    enabled: false
  cloudflare_analytics:
    enabled: false
  umami_analytics:
    enabled: false