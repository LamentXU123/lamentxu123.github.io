scheme: Gemini
darkmode: true

custom_file_path:
  style: source/_data/styles.styl

menu:
  home: / || fa fa-home
  archives: /archives/ || fa fa-archive
  categories: /categories/ || fa fa-th
  tags: /tags/ || fa fa-tags
  about: /about/ || fa fa-user

menu_settings:
  icons: true
  badges: false

avatar:
  url: /images/avatar.svg
  rounded: true
  rotated: false

social:
  GitHub: https://github.com/LamentXU || fab fa-github
  原博客: https://www.cnblogs.com/LAMENTXU || fa fa-link

social_icons:
  enable: true
  icons_only: false
  transition: true

footer:
  since: 2024
  icon:
    name: fa fa-terminal
    animated: false
    color: "#5eead4"
  copyright: LamentXU
  powered: true
  beian:
    enable: false

codeblock:
  theme:
    light: default
    dark: stackoverflow-dark
  copy_button:
    enable: true
    style: mac

back2top:
  enable: true
  sidebar: false
  scrollpercent: true

reading_progress:
  enable: true
  start_at: left
  position: top
  reversed: false
  color: "#5eead4"
  height: 2px

local_search:
  enable: true
  top_n_per_article: 3
  unescape: true
  preload: false

motion:
  enable: true
  async: false
  duration: 120

font:
  enable: true
  global:
    external: false
    family: "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    size: 1
  headings:
    external: false
    family: "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
  codes:
    external: false
    family: "JetBrains Mono, Cascadia Code, Consolas, Menlo, monospace"

creative_commons:
  license: by-nc-sa
  size: small
  sidebar: false
  post: true
  language: deed.zh
