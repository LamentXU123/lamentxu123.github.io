name: Update php-src stats

on:
  push:
    branches:
      - main
    paths-ignore:
      - "php-src-stats.json"
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: php-src-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update stats
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/update-php-src-stats.mjs

      - name: Commit updated stats
        run: |
          if git diff --quiet -- php-src-stats.json; then
            echo "No stats changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add php-src-stats.json
          git commit -m "Update php-src contribution stats"
          git push
